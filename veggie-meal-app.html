<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2d7a5a">
<title>채소볶음 건강식단</title>
<style>
:root {
  --green:#2d7a5a; --green-light:#e8f5ee; --green-dark:#1e5c42;
  --text:#1a1a1a; --sub:#5a5a5a; --hint:#999;
  --bg:#f7f5f0; --card:#fff; --border:rgba(0,0,0,0.08);
  --r:16px; --rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.app-sub{font-size:11px;color:var(--green);font-weight:600;margin-top:1px}
.hbtn{background:var(--green-light);border:none;color:var(--green);font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer}
.tabs{display:flex;gap:4px;background:var(--bg);padding:2px;border-radius:12px}
.tab{flex:1;text-align:center;font-size:13px;font-weight:600;padding:8px 0;border-radius:10px;border:none;background:none;color:var(--hint);cursor:pointer;transition:all .2s}
.tab.on{background:var(--card);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.main{padding:16px 16px 100px;max-width:480px;margin:0 auto}
.slabel{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px}
.dcard{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.dhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.dname{font-size:13px;font-weight:700;color:var(--sub)}
.sbtn{background:var(--bg);border:none;color:var(--hint);font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer}
.rslot{padding:0 16px 0;display:flex;align-items:center;gap:12px;cursor:pointer;active:background:#f0f0f0}
.ricon{width:44px;height:44px;border-radius:12px;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rtags{display:flex;gap:4px;flex-wrap:wrap}
.rtag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--green-light);color:var(--green)}
.nutrow{display:flex;gap:5px;padding:10px 16px 8px;flex-wrap:wrap}
.nb{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.nf{background:#e8f5ee;color:#2d7a5a} .ni{background:#ffeee8;color:#c0522a}
.nc{background:#e8f0fe;color:#2a5fc0} .np{background:#eeeffe;color:#5048b0}
.no{background:#fff8e1;color:#b07a00} .nv{background:#f3e8ff;color:#7048b0}
.nd{background:#f0f0f0;color:#666}
.tip{font-size:11px;color:var(--hint);padding:6px 10px 14px 16px}
.arrow{color:#ccc;font-size:20px;padding-right:8px;flex-shrink:0}
/* shopping */
.shead{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)}
.scnt{font-size:22px;font-weight:700;color:var(--green)}
.scntl{font-size:12px;color:var(--hint);margin-top:1px}
.pbar{height:4px;background:var(--bg);border-radius:4px;margin-top:8px;overflow:hidden}
.pfill{height:4px;background:var(--green);border-radius:4px;transition:width .3s}
.scat{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.catheader{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.catname{font-size:13px;font-weight:700;color:var(--text);flex:1}
.catcnt{font-size:11px;color:var(--hint)}
.sitem{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.sitem:last-child{border-bottom:none}
.sitem.done .iname{text-decoration:line-through;color:var(--hint)}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sitem.done .chk{background:var(--green);border-color:var(--green)}
.ckico{display:none;color:#fff;font-size:12px;font-weight:700}
.sitem.done .ckico{display:block}
.iname{font-size:14px;color:var(--text);flex:1}
.iqty{font-size:12px;color:var(--hint)}
/* bottom bar */
.bbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:10px;z-index:99}
.bbtn{flex:1;padding:14px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;cursor:pointer}
.bbtn.pri{background:var(--green);color:#fff}
.bbtn.sec{background:var(--bg);color:var(--sub)}
.empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:14px}
/* modal */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.moverlay.open{display:flex}
.msheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding-bottom:max(24px,env(safe-area-inset-bottom));animation:sup .28s cubic-bezier(.32,.72,0,1)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0}
.mhdr{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.memoji{font-size:36px;margin-bottom:4px}
.mtitle{font-size:20px;font-weight:700;letter-spacing:-0.3px;margin-bottom:6px}
.mclose{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;font-size:16px;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msec{padding:0 20px 16px}
.msectitle{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.mdiv{height:1px;background:var(--border);margin:4px 20px 16px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.iitem{background:var(--bg);border-radius:10px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
.iiname{font-size:13px;font-weight:600;color:var(--text)}
.iiqty{font-size:12px;color:var(--hint)}
.steplist{display:flex;flex-direction:column;gap:10px}
.stepitem{display:flex;gap:12px;align-items:flex-start}
.stepnum{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.steptxt{font-size:14px;color:var(--text);line-height:1.6;flex:1}
.tipbox{background:var(--green-light);border-radius:12px;padding:12px 14px;display:flex;gap:8px;align-items:flex-start}
.tiptxt{font-size:13px;color:var(--green);line-height:1.55}
.nutrow2{display:flex;flex-wrap:wrap;gap:6px}
.save-bar{background:var(--card);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.save-bar-txt{font-size:13px;color:var(--sub)}
.save-btn{background:var(--green);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer}
.saved-card{background:var(--card);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--border);overflow:hidden}
.saved-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.saved-date{font-size:12px;font-weight:700;color:var(--green)}
.saved-actions{display:flex;gap:6px}
.load-btn{background:var(--green-light);color:var(--green);border:none;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
.del-btn{background:#fff0f0;color:#c0522a;border:none;padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer}
.saved-meals{padding:0 16px 14px;display:flex;flex-direction:column;gap:6px}
.saved-meal-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 0;border-bottom:1px solid var(--border)}
.saved-meal-row:last-child{border-bottom:none}
.saved-day{font-size:11px;font-weight:700;color:var(--hint);width:28px;flex-shrink:0}
.saved-name{font-size:13px;color:var(--text);flex:1}
.saved-emoji{font-size:14px;flex-shrink:0}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">채소볶음 건강식단</div>
      <div class="app-sub">다음 주 저녁 · 2인분</div>
    </div>
    <button class="hbtn" onclick="generateWeek()">새 식단 뽑기</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-meal" onclick="showTab('meal')">주간 식단</button>
    <button class="tab" id="tab-shop" onclick="showTab('shop')">장보기</button>
    <button class="tab" id="tab-saved" onclick="showTab('saved')">저장</button>
    <button class="tab" id="tab-recipes" onclick="showTab('recipes')">레시피</button>
  </div>
</div>

<div class="main">
  <div id="view-meal"></div>
  <div id="view-shop" style="display:none"></div>
  <div id="view-saved" style="display:none"></div>
  <div id="view-recipes" style="display:none"></div>
</div>

<div class="moverlay" id="modal" onclick="overlayClose(event)">
  <div class="msheet" id="msheet">
    <div class="mhandle"></div>
    <div class="mhdr">
      <div style="flex:1">
        <div class="memoji" id="m-emoji"></div>
        <div class="mtitle" id="m-title"></div>
        <div class="nutrow2" id="m-tags" style="margin-bottom:12px"></div>
      </div>
      <button class="mclose" id="mcloseBtn">✕</button>
    </div>
    <div class="msec">
      <div class="msectitle">영양 포인트</div>
      <div class="nutrow2" id="m-nut"></div>
    </div>
    <div class="mdiv"></div>
    <div class="msec">
      <div class="msectitle">재료 (2인분)</div>
      <div class="igrid" id="m-ing"></div>
    </div>
    <div class="mdiv"></div>
    <div class="msec">
      <div class="msectitle">조리 순서</div>
      <div class="steplist" id="m-steps"></div>
    </div>
    <div class="mdiv"></div>
    <div class="msec">
      <div class="tipbox">
        <span style="font-size:16px;flex-shrink:0">💡</span>
        <span class="tiptxt" id="m-tip"></span>
      </div>
    </div>
  </div>
</div>

<div class="bbar" id="bbar">
  <button class="bbtn sec" onclick="generateWeek()">다시 뽑기</button>
  <button class="bbtn sec" onclick="saveWeek()" style="background:var(--green-light);color:var(--green)">이번 주 저장</button>
  <button class="bbtn pri" onclick="showTab('shop')">장보기 →</button>
</div>

<script>
var RECIPES = [
{id:1,name:"버섯 버터볶음",ingredients:["새송이버섯 150g","표고버섯 100g","버터 1T","올리브유 1T","마늘 2쪽","소금 약간"],tags:["채소볶음","버섯"],nutrition:["비타민D","식이섬유"],tip:"센 불에 빠르게 볶아야 수분이 안 생김"},
{id:2,name:"브로콜리 마늘볶음",ingredients:["브로콜리 200g","마늘 3쪽","올리브유 2T","소금 약간","통깨 약간"],tags:["채소볶음","브로콜리"],nutrition:["엽산","비타민C","식이섬유"],tip:"살짝 데친 후 볶으면 색이 선명"},
{id:3,name:"시금치 참기름무침",ingredients:["시금치 200g","참기름 1T","간장 0.5T","마늘 1쪽","통깨 약간"],tags:["무침","시금치"],nutrition:["엽산","철분","비타민K"],tip:"살짝만 데쳐야 영양소 파괴 최소화"},
{id:4,name:"두부 간장볶음",ingredients:["두부 1모","간장 1T","참기름 1T","올리브유 1T","마늘 2쪽","대파 약간"],tags:["채소볶음","두부"],nutrition:["단백질","칼슘"],tip:"키친타월로 물기 제거 후 볶아야 바삭"},
{id:5,name:"애호박 달걀볶음",ingredients:["애호박 1개","달걀 2개","올리브유 1T","소금 약간","대파 약간"],tags:["채소볶음","애호박"],nutrition:["단백질","비타민A","엽산"],tip:"달걀은 마지막에 넣어 반숙으로 마무리"},
{id:6,name:"파프리카 새우볶음",ingredients:["빨강파프리카 1개","노랑파프리카 1개","새우 150g","올리브유 1T","마늘 2쪽","소금 약간"],tags:["채소볶음","파프리카"],nutrition:["비타민C","단백질","칼슘"],tip:"고온에서 빠르게 볶아 아삭함 유지"},
{id:7,name:"당근 들깨볶음",ingredients:["당근 1개","들깨가루 1T","올리브유 1T","소금 약간","마늘 1쪽"],tags:["채소볶음","당근"],nutrition:["베타카로틴","비타민A","오메가3"],tip:"기름에 볶아야 베타카로틴 흡수율 상승"},
{id:8,name:"청경채 굴소스볶음",ingredients:["청경채 200g","마늘 3쪽","굴소스 1T","올리브유 1T","참기름 약간"],tags:["채소볶음","청경채"],nutrition:["칼슘","엽산","비타민C"],tip:"줄기부터 볶다가 잎은 마지막에"},
{id:9,name:"양배추 된장볶음",ingredients:["양배추 1/4개","된장 1T","마늘 2쪽","올리브유 1T","참기름 약간"],tags:["채소볶음","양배추"],nutrition:["비타민C","비타민K","식이섬유"],tip:"된장은 마지막에 넣어야 타지 않음"},
{id:10,name:"가지 간장볶음",ingredients:["가지 2개","간장 1T","마늘 2쪽","올리브유 2T","참기름 1T","통깨 약간"],tags:["채소볶음","가지"],nutrition:["안토시아닌","식이섬유","칼륨"],tip:"소금에 절였다 볶으면 기름 흡수 줄어듦"},
{id:11,name:"닭안심 브로콜리볶음",ingredients:["닭안심 200g","브로콜리 150g","마늘 2쪽","올리브유 1T","소금 약간","후추 약간"],tags:["채소볶음","닭안심"],nutrition:["단백질","엽산","비타민C"],tip:"닭안심은 얇게 썰어야 빨리 익음"},
{id:12,name:"팽이버섯 달걀볶음",ingredients:["팽이버섯 1봉","달걀 2개","대파 1대","올리브유 1T","간장 0.5T","참기름 약간"],tags:["채소볶음","버섯"],nutrition:["단백질","비타민D","식이섬유"],tip:"뿌리 자르고 손으로 뜯어 볶기"},
{id:13,name:"시금치 두부볶음",ingredients:["시금치 150g","두부 반모","마늘 2쪽","올리브유 1T","간장 0.5T","참기름 약간"],tags:["채소볶음","시금치"],nutrition:["엽산","철분","단백질","칼슘"],tip:"철분+단백질 최강 조합"},
{id:14,name:"소불고기 버섯볶음",ingredients:["소불고기용 200g","새송이버섯 100g","양파 반개","간장 1T","참기름 1T","마늘 2쪽","설탕 약간"],tags:["채소볶음","소고기"],nutrition:["철분","단백질","아연"],tip:"냉동 상태에서 살짝 녹여 얇게 썰기"},
{id:15,name:"애호박 두부조림",ingredients:["애호박 1개","두부 1모","간장 2T","마늘 2쪽","참기름 1T","통깨 약간"],tags:["조림","두부"],nutrition:["단백질","칼슘","비타민A"],tip:"약불에서 천천히 조려야 간이 잘 배임"},
{id:16,name:"단호박 버터찜",ingredients:["단호박 1/4개","버터 1T","소금 약간","꿀 약간"],tags:["찜","단호박"],nutrition:["베타카로틴","비타민A","식이섬유"],tip:"전자레인지 5분. 씨 제거 후 랩 씌워서"},
{id:17,name:"콩나물 무침",ingredients:["콩나물 200g","참기름 1T","간장 0.5T","마늘 1쪽","통깨 약간","대파 약간"],tags:["무침","콩나물"],nutrition:["비타민C","단백질","식이섬유"],tip:"뚜껑 열지 않고 삶아야 비린내 없음"},
{id:18,name:"오이 초무침",ingredients:["오이 1개","식초 1T","설탕 0.5T","소금 약간","참기름 약간","통깨 약간"],tags:["무침","오이"],nutrition:["비타민C","수분","칼륨"],tip:"소금에 절였다 물기 짜면 아삭함 유지"},

var DAYS = ['월','화','수','목','금'];
var EMOJIS = {'채소볶음':'🥦','무침':'🥗','조림':'🍲','찜':'🫕','구이':'🔥','나물볶음':'🌿','국':'🍵','찌개':'🥘'};
var NCLASS = {'엽산':'nf','철분':'ni','칼슘':'nc','단백질':'np','오메가3':'no','DHA':'no','비타민C':'nv','비타민D':'nv','비타민A':'nv','베타카로틴':'nv'};
var CATS = [
  {name:'채소류',icon:'🥦',keys:['버섯','브로콜리','시금치','애호박','파프리카','당근','청경채','양배추','가지','콩나물','오이','연근','아욱','부추','열무','깻잎','숙주','참나물','감자','단호박','고구마','무','양파','미역']},
  {name:'단백질류',icon:'🥩',keys:['닭안심','닭가슴살','소불고기','소고기','새우','연어','달걀','두부','순두부']},
  {name:'양념류',icon:'🧄',keys:['마늘','간장','참기름','들기름','올리브유','된장','굴소스','버터','들깨가루','강황가루']},
  {name:'기타',icon:'🛒',keys:[]}
];

var weekPlan = [];
var shopChecked = {};
var usedIds = [];

function getEmoji(r) {
  for(var i=0;i<r.tags.length;i++){if(EMOJIS[r.tags[i]])return EMOJIS[r.tags[i]];}
  return '🍽️';
}
function getNClass(n) { return NCLASS[n]||'nd'; }

function pickRandom(n) {
  var pool = RECIPES.filter(function(r){return usedIds.indexOf(r.id)<0;});
  if(pool.length < n) pool = RECIPES.slice();
  var picked = [];
  var tmp = pool.slice();
  while(picked.length < n && tmp.length > 0) {
    var idx = Math.floor(Math.random()*tmp.length);
    picked.push(tmp.splice(idx,1)[0]);
  }
  usedIds = usedIds.concat(picked.map(function(r){return r.id;})).slice(-20);
  return picked;
}

function generateWeek() {
  weekPlan = pickRandom(5);
  shopChecked = {};
  renderMeal();
  renderShop();
}

function swapOne(i) {
  var ids = weekPlan.map(function(r){return r.id;});
  var pool = RECIPES.filter(function(r){return ids.indexOf(r.id)<0;});
  if(!pool.length) return;
  weekPlan[i] = pool[Math.floor(Math.random()*pool.length)];
  renderMeal();
  renderShop();
}

function renderMeal() {
  var el = document.getElementById('view-meal');
  var html = '<div class="slabel">이번 주 저녁 식단</div>';
  for(var i=0;i<DAYS.length;i++) {
    var r = weekPlan[i];
    if(!r) continue;
    var nutHtml = r.nutrition.map(function(n){return '<span class="nb '+getNClass(n)+'">'+n+'</span>';}).join('');
    var tagHtml = r.tags.slice(0,3).map(function(t){return '<span class="rtag">'+t+'</span>';}).join('');
    html += '<div class="dcard">'
      +'<div class="dhead"><div class="dname">'+DAYS[i]+'요일</div>'
      +'<button class="sbtn" onclick="swapOne('+i+')">다른 메뉴</button></div>'
      +'<div class="rslot" onclick="openModal('+r.id+')">'
      +'<div class="ricon">'+getEmoji(r)+'</div>'
      +'<div class="rinfo"><div class="rname">'+r.name+'</div>'
      +'<div class="rtags">'+tagHtml+'</div></div>'
      +'<div class="arrow">›</div>'
      +'</div>'
      +'<div class="nutrow">'+nutHtml+'</div>'
      +'<div class="tip">💡 '+r.tip+'</div>'
      +'</div>';
  }
  el.innerHTML = html;
}

function openModal(id) {
  var r = null;
  for(var i=0;i<RECIPES.length;i++){if(RECIPES[i].id===id){r=RECIPES[i];break;}}
  if(!r) return;
  document.getElementById('m-emoji').textContent = getEmoji(r);
  document.getElementById('m-title').textContent = r.name;
  document.getElementById('m-tags').innerHTML = r.tags.map(function(t){return '<span class="rtag">'+t+'</span>';}).join('');
  document.getElementById('m-nut').innerHTML = r.nutrition.map(function(n){return '<span class="nb '+getNClass(n)+'">'+n+'</span>';}).join('');
  document.getElementById('m-ing').innerHTML = r.ingredients.map(function(ing){
    var m = ing.match(/^(.+?)\s+([\d\/]+[a-zA-Zg가-힣]+.*)$/);
    var nm = m ? m[1] : ing;
    var qty = m ? m[2] : '';
    return '<div class="iitem"><span class="iiname">'+nm+'</span><span class="iiqty">'+qty+'</span></div>';
  }).join('');
  var steps = STEPS[id] || ['조리 방법을 준비 중이에요.'];
  document.getElementById('m-steps').innerHTML = steps.map(function(s,i){
    return '<div class="stepitem"><div class="stepnum">'+(i+1)+'</div><div class="steptxt">'+s+'</div></div>';
  }).join('');
  document.getElementById('m-tip').textContent = r.tip;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClose(e) {
  if(e.target === document.getElementById('modal')) closeModal();
}

document.getElementById('mcloseBtn').addEventListener('click', closeModal);

function buildShopList() {
  var all = {};
  for(var i=0;i<weekPlan.length;i++){
    var r = weekPlan[i];
    for(var j=0;j<r.ingredients.length;j++){
      var ing = r.ingredients[j];
      var m = ing.match(/^(.+?)\s+([\d\/]+[a-zA-Zg가-힣]+.*)$/);
      var nm = m ? m[1].trim() : ing.trim();
      var qty = m ? m[2] : '';
      if(!all[nm]) all[nm] = qty;
    }
  }
  return all;
}

function renderShop() {
  var el = document.getElementById('view-shop');
  if(!weekPlan.length){el.innerHTML='<div class="empty">먼저 식단을 뽑아주세요</div>';return;}
  var all = buildShopList();
  var names = Object.keys(all);
  var total = names.length;
  var done = names.filter(function(n){return shopChecked[n];}).length;
  var pct = total ? Math.round(done/total*100) : 0;
  var html = '<div class="shead"><div><div class="scnt">'+done+' / '+total+'</div>'
    +'<div class="scntl">항목 완료</div>'
    +'<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>'
    +'<button class="sbtn" style="font-size:13px;padding:6px 12px" onclick="shopChecked={};renderShop()">초기화</button></div>';

  var assigned = [];
  for(var c=0;c<CATS.length;c++){
    var cat = CATS[c];
    var items;
    if(cat.name === '기타') {
      items = names.filter(function(n){return assigned.indexOf(n)<0;});
    } else {
      items = names.filter(function(n){
        for(var k=0;k<cat.keys.length;k++){if(n.indexOf(cat.keys[k])>=0)return true;}
        return false;
      });
    }
    if(!items.length) continue;
    items.forEach(function(n){if(assigned.indexOf(n)<0)assigned.push(n);});
    var catDone = items.filter(function(n){return shopChecked[n];}).length;
    html += '<div class="scat"><div class="catheader"><span>'+cat.icon+'</span>'
      +'<span class="catname">'+cat.name+'</span>'
      +'<span class="catcnt">'+catDone+'/'+items.length+'</span></div>';
    for(var k=0;k<items.length;k++){
      var nm = items[k];
      var d = shopChecked[nm];
      var safeNm = nm.replace(/'/g,"\\'");
      var coupangUrl = 'https://www.coupang.com/np/search?q='+encodeURIComponent(nm)+'&listSize=36&isPriceRange=false&filterType=rocket';
      html += '<div class="sitem'+(d?' done':'')+'">'
        +'<div onclick="toggleItem(\''+safeNm+'\')" style="display:flex;align-items:center;gap:12px;flex:1;padding:11px 0 11px 16px">'
        +'<div class="chk"><span class="ckico">✓</span></div>'
        +'<span class="iname">'+nm+'</span>'
        +'<span class="iqty">'+(all[nm]||'')+'</span>'
        +'</div>'
        +'<a href="'+coupangUrl+'" target="_blank" style="display:flex;align-items:center;padding:11px 14px 11px 8px;text-decoration:none;flex-shrink:0">'
        +'<span style="font-size:11px;font-weight:700;color:#e4393c;background:#fff0f0;padding:3px 8px;border-radius:20px;white-space:nowrap">🚀 로켓</span>'
        +'</a>'
        +'</div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function toggleItem(nm) {
  shopChecked[nm] = !shopChecked[nm];
  renderShop();
}

function showTab(t) {
  var views = ['meal','shop','saved','recipes'];
  views.forEach(function(v){
    document.getElementById('view-'+v).style.display = t===v?'':'none';
    document.getElementById('tab-'+v).className = 'tab'+(t===v?' on':'');
  });
  document.getElementById('bbar').style.display = t==='meal'?'':'none';
  if(t==='saved') renderSaved();
  if(t==='recipes') renderRecipes();
}

// ── 저장 기능 (localStorage) ─────────────────────────────
function getSaved() {
  try { return JSON.parse(localStorage.getItem('veggie-saved')||'[]'); } catch(e) { return []; }
}
function setSaved(arr) {
  localStorage.setItem('veggie-saved', JSON.stringify(arr));
}

function saveWeek() {
  if(!weekPlan.length) return;
  var saved = getSaved();
  var now = new Date();
  // 날짜+시간으로 항상 새로 저장
  var label = now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 '
    +now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  var entry = {label:label, ts:now.getTime(), ids:weekPlan.map(function(r){return r.id;})};
  saved.unshift(entry);
  setSaved(saved);
  showToast('식단이 저장됐어요!');
}

function loadWeek(ids) {
  weekPlan = ids.map(function(id){
    return RECIPES.find(function(r){return r.id===id;});
  }).filter(Boolean);
  shopChecked = {};
  renderMeal();
  renderShop();
  showTab('meal');
  showToast('식단을 불러왔어요');
}

function deleteSaved(ts) {
  var saved = getSaved().filter(function(s){return s.ts!==ts;});
  setSaved(saved);
  renderSaved();
}

function renderSaved() {
  var el = document.getElementById('view-saved');
  var saved = getSaved();
  if(!saved.length) {
    el.innerHTML = '<div class="empty" style="margin-top:40px">저장된 식단이 없어요<br><span style="font-size:12px;margin-top:8px;display:block">주간 식단 탭에서 "이번 주 저장"을 눌러보세요</span></div>';
    return;
  }
  var html = '<div class="slabel">저장된 식단 ('+saved.length+'개)</div>';
  saved.forEach(function(s) {
    html += '<div class="saved-card">'
      +'<div class="saved-head">'
      +'<div class="saved-date">📅 '+s.label+'</div>'
      +'<div class="saved-actions">'
      +'<button class="load-btn" onclick="loadWeek('+JSON.stringify(s.ids)+')">불러오기</button>'
      +'<button class="del-btn" onclick="deleteSaved('+s.ts+')">삭제</button>'
      +'</div></div>'
      +'<div class="saved-meals">';
    var days = ['월','화','수','목','금'];
    s.ids.forEach(function(id, i) {
      var r = RECIPES.find(function(x){return x.id===id;});
      if(!r) return;
      html += '<div class="saved-meal-row" onclick="openModal('+id+')">'
        +'<div class="saved-day">'+days[i]+'</div>'
        +'<div class="saved-emoji">'+getEmoji(r)+'</div>'
        +'<div class="saved-name">'+r.name+'</div>'
        +'<div style="color:#ccc;font-size:16px">›</div>'
        +'</div>';
    });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

// ── 레시피 전체 탭 ────────────────────────────────────────
var selectedIngredient = null;

var FILTER_CATS = {
  '채소류': ['버섯','브로콜리','시금치','애호박','파프리카','당근','청경채','양배추','가지','콩나물','오이','연근','아욱','부추','열무','깻잎','숙주','참나물','감자','단호박','고구마','무','양파','미역'],
  '단백질류': ['닭안심','닭가슴살','소고기','새우','연어','달걀','두부','순두부']
};

function renderRecipes() {
  var el = document.getElementById('view-recipes');
  var filtered = selectedIngredient
    ? RECIPES.filter(function(r){
        return r.ingredients.some(function(ing){return ing.indexOf(selectedIngredient)>=0;});
      })
    : RECIPES;

  var filterHtml = '<div class="slabel">재료로 찾기</div>';

  // 채소류
  filterHtml += '<div style="font-size:11px;font-weight:700;color:#2d7a5a;margin-bottom:6px">🥦 채소류</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">';
  FILTER_CATS['채소류'].forEach(function(ing) {
    var active = selectedIngredient===ing;
    filterHtml += '<button onclick="selectedIngredient=\''+ ing +'\';renderRecipes()" style="font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;transition:all .15s;'+(active?'background:#2d7a5a;color:#fff':'background:#e8f5ee;color:#2d7a5a')+'">'+ing+'</button>';
  });
  filterHtml += '</div>';

  // 단백질류
  filterHtml += '<div style="font-size:11px;font-weight:700;color:#5048b0;margin-bottom:6px">🥩 단백질류</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">';
  FILTER_CATS['단백질류'].forEach(function(ing) {
    var active = selectedIngredient===ing;
    filterHtml += '<button onclick="selectedIngredient=\''+ ing +'\';renderRecipes()" style="font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;border:none;cursor:pointer;transition:all .15s;'+(active?'background:#5048b0;color:#fff':'background:#eeeffe;color:#5048b0')+'">'+ing+'</button>';
  });
  filterHtml += '</div>';

  // 전체 버튼
  filterHtml += '<button onclick="selectedIngredient=null;renderRecipes()" style="font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;border:none;cursor:pointer;margin-top:4px;margin-bottom:16px;'+(selectedIngredient===null?'background:#1a1a1a;color:#fff':'background:#f0f0f0;color:#666')+'">전체 보기</button>';

  filterHtml += '<div class="slabel">레시피 '+filtered.length+'개</div>';

  var listHtml = filtered.map(function(r) {
    return '<div class="dcard" onclick="openModal('+r.id+')" style="cursor:pointer">'
      +'<div style="display:flex;align-items:center;gap:12px;padding:12px 16px">'
      +'<div class="ricon">'+getEmoji(r)+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="rname">'+r.name+'</div>'
      +'<div class="rtags" style="margin-top:3px">'+r.tags.slice(0,2).map(function(t){return '<span class="rtag">'+t+'</span>';}).join('')+'</div>'
      +'</div>'
      +'<div style="color:#ccc;font-size:20px">›</div>'
      +'</div>'
      +'<div class="nutrow" style="padding-top:0">'+r.nutrition.map(function(n){return '<span class="nb '+getNClass(n)+'">'+n+'</span>';}).join('')+'</div>'
      +'</div>';
  }).join('');

  el.innerHTML = filterHtml + listHtml;
}

function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();}, 2000);
}


generateWeek();

// ── PWA 설치 배너 ──────────────────────────────────────────
var deferredPrompt = null;
var installBanner = null;

function createBanner(html, id) {
  var el = document.createElement('div');
  el.id = id;
  el.innerHTML = html;
  document.body.appendChild(el);
  return el;
}

// Android: 브라우저가 설치 가능 이벤트 발생 시 캐치
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;

  // 이미 설치됐으면 배너 안 띄움
  if (window.matchMedia('(display-mode: standalone)').matches) return;

  installBanner = createBanner(
    '<div style="display:flex;align-items:center;gap:12px;padding:14px 16px">'
    + '<span style="font-size:28px">🥦</span>'
    + '<div style="flex:1">'
    + '<div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:2px">홈 화면에 추가할까요?</div>'
    + '<div style="font-size:12px;color:#666">앱처럼 바로 열 수 있어요</div>'
    + '</div>'
    + '<button id="install-yes" style="background:#2d7a5a;color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer">추가</button>'
    + '<button id="install-no" style="background:#f0f0f0;color:#666;border:none;padding:8px 12px;border-radius:20px;font-size:13px;cursor:pointer">나중에</button>'
    + '</div>',
    'install-banner'
  );
  installBanner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.15);z-index:300;animation:slideUp2 .3s ease';

  var style = document.createElement('style');
  style.textContent = '@keyframes slideUp2{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}';
  document.head.appendChild(style);

  document.getElementById('install-yes').addEventListener('click', function() {
    installBanner.remove();
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r) {
      deferredPrompt = null;
    });
  });

  document.getElementById('install-no').addEventListener('click', function() {
    installBanner.remove();
    sessionStorage.setItem('install-dismissed', '1');
  });
});

// iOS 감지: 사파리이고 아직 설치 안 된 경우
var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

if (isIOS && isSafari && !isStandalone && !sessionStorage.getItem('ios-dismissed')) {
  setTimeout(function() {
    var banner = createBanner(
      '<div style="padding:14px 16px 10px">'
      + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      + '<span style="font-size:24px">🥦</span>'
      + '<div><div style="font-size:14px;font-weight:700;color:#1a1a1a">홈 화면에 추가하면 앱처럼 써요</div>'
      + '<div style="font-size:12px;color:#666;margin-top:1px">아래 버튼을 탭해 추가하세요</div></div>'
      + '<button id="ios-close" style="margin-left:auto;background:none;border:none;font-size:18px;color:#999;cursor:pointer;padding:0 4px">✕</button>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:8px;background:#f7f5f0;border-radius:10px;padding:10px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;font-size:13px;color:#444">'
      + '<span style="font-size:18px">⬆️</span>'
      + '<span>하단 <strong>공유 버튼</strong> 탭</span>'
      + '</div>'
      + '<span style="color:#ccc;margin:0 4px">→</span>'
      + '<div style="display:flex;align-items:center;gap:6px;font-size:13px;color:#444">'
      + '<span style="font-size:18px">＋</span>'
      + '<span><strong>홈 화면에 추가</strong></span>'
      + '</div>'
      + '</div>'
      + '</div>'
      + '<div style="width:16px;height:16px;background:#fff;transform:rotate(45deg);position:absolute;bottom:-7px;left:50%;margin-left:-8px;border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0"></div>',
      'ios-banner'
    );
    banner.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#fff;border-radius:16px;border:1px solid #e8e8e8;box-shadow:0 4px 20px rgba(0,0,0,0.12);z-index:300;animation:slideUp2 .3s ease';

    document.getElementById('ios-close').addEventListener('click', function() {
      banner.remove();
      sessionStorage.setItem('ios-dismissed', '1');
    });
  }, 2500);
}

// 설치 완료 감지
window.addEventListener('appinstalled', function() {
  if (installBanner) installBanner.remove();
  var toast = document.createElement('div');
  toast.textContent = '홈 화면에 추가됐어요!';
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2d7a5a;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:400;animation:slideUp2 .3s ease';
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2500);
});
</script>
